<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Raleway:wght@400;600&display=swap');
:root{--r:#CC0000;--dr:#8B0000;--g:#D4AF37;--w:#F5F0E8;--bk:#080808;--g1:#181818;--g2:#242424;}
:root.day{--bk:#f0ece4;--g1:#e0dbd0;--g2:#d0ccc0;--w:#1a1a1a;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{background:var(--bk);color:var(--w);font-family:'Raleway',sans-serif;}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 10% 60%,rgba(139,0,0,.2) 0%,transparent 50%);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding-bottom:240px;}
#ytc{position:fixed;width:1px;height:1px;overflow:hidden;bottom:0;left:0;z-index:-1;}
.hdr{padding:12px 16px;border-bottom:1px solid rgba(204,0,0,.35);display:flex;align-items:center;gap:12px;background:rgba(6,6,6,.98);position:sticky;top:0;z-index:100;}
.lsvg{width:46px;height:46px;flex-shrink:0;}
.ltx{flex:1;}
.lti{font-family:'Cinzel',serif;font-size:18px;font-weight:900;letter-spacing:3px;}
.lsu{font-size:9px;letter-spacing:4px;color:var(--r);margin-top:2px;}
.eq{display:flex;gap:2px;align-items:flex-end;height:16px;}
.eq span{width:3px;border-radius:2px;background:var(--r);animation:eq .5s infinite ease-in-out alternate;}
.eq span:nth-child(1){height:5px;animation-delay:0s;}
.eq span:nth-child(2){height:13px;animation-delay:.08s;}
.eq span:nth-child(3){height:8px;animation-delay:.16s;}
.eq span:nth-child(4){height:16px;animation-delay:.04s;}
.eq span:nth-child(5){height:6px;animation-delay:.12s;}
.eq.off span{animation-play-state:paused;}
@keyframes eq{0%{transform:scaleY(.3);}100%{transform:scaleY(1);}}
.sw{padding:14px 16px 10px;}
.sb{display:flex;background:var(--g1);border:1.5px solid rgba(204,0,0,.4);border-radius:10px;overflow:hidden;}
.sb:focus-within{border-color:var(--r);}
.sb input{flex:1;background:transparent;border:none;outline:none;padding:13px 14px;color:var(--w);font-family:'Raleway',sans-serif;font-size:15px;}
.sb input::placeholder{color:rgba(245,240,232,.28);}
.sgo{background:var(--r);border:none;cursor:pointer;padding:0 20px;color:#fff;font-size:18px;}
.status{margin:0 16px 10px;padding:9px 13px;border-radius:8px;font-size:12px;display:none;line-height:1.6;}
.status.err{background:rgba(204,0,0,.15);border:1px solid rgba(204,0,0,.4);color:#ff9999;display:block;}
.status.ok{background:rgba(0,160,0,.1);border:1px solid rgba(0,160,0,.3);color:#88ee88;display:block;}
.status.inf{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);color:var(--g);display:block;}
.tabs{display:flex;padding:0 16px;margin-bottom:8px;}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-family:'Cinzel',serif;border:none;background:transparent;cursor:pointer;color:rgba(245,240,232,.3);border-bottom:2px solid transparent;transition:all .2s;}
.tab.on{color:var(--r);border-bottom-color:var(--r);}
.tc{display:none;}.tc.on{display:block;}
.stl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--r);margin:4px 16px 8px;display:flex;align-items:center;gap:8px;}
.stl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(204,0,0,.4),transparent);}
.trk{display:flex;gap:10px;align-items:center;padding:9px 10px;border-radius:8px;cursor:pointer;margin:0 6px 3px;border:1px solid transparent;}
.trk:active{background:rgba(204,0,0,.15);}
.trk.on{background:rgba(204,0,0,.2);border-color:rgba(204,0,0,.5);}
.tth{width:56px;height:56px;border-radius:6px;background:var(--g2);flex-shrink:0;overflow:hidden;position:relative;}
.tth img{width:100%;height:100%;object-fit:cover;display:block;}
.tno{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--g2);}
.pov{position:absolute;inset:0;background:rgba(204,0,0,.8);display:flex;align-items:center;justify-content:center;opacity:0;font-size:18px;}
.trk.on .pov{opacity:1;}
.ti{flex:1;min-width:0;}
.tn{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tc2{font-size:11px;color:rgba(245,240,232,.4);margin-top:3px;}
.td{font-size:11px;color:rgba(245,240,232,.28);white-space:nowrap;}
.dots{display:flex;gap:7px;justify-content:center;padding:30px;}
.dots i{width:9px;height:9px;border-radius:50%;background:var(--r);animation:bn .8s infinite;display:block;}
.dots i:nth-child(2){animation-delay:.15s;}.dots i:nth-child(3){animation-delay:.3s;}
@keyframes bn{0%,80%,100%{transform:scale(.55);opacity:.25;}40%{transform:scale(1.1);opacity:1;}}
.emp{text-align:center;padding:36px 20px;color:rgba(245,240,232,.22);font-size:13px;line-height:1.9;}
.emp .ic{font-size:40px;margin-bottom:10px;opacity:.35;}
.ply{position:fixed;bottom:0;left:0;right:0;background:rgba(6,6,6,.98);border-top:1.5px solid rgba(204,0,0,.45);padding:0 16px 22px;z-index:200;}
.nps{display:flex;align-items:center;gap:10px;padding:10px 0 8px;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:8px;cursor:pointer;}
.npth{width:46px;height:46px;border-radius:8px;background:var(--g2);flex-shrink:0;overflow:hidden;position:relative;}

.npni{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.npi{flex:1;min-width:0;}
.nptl{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.npch{font-size:11px;color:rgba(245,240,232,.38);margin-top:2px;}
.hb{background:none;border:none;cursor:pointer;font-size:20px;color:rgba(245,240,232,.3);padding:5px;}
.hb.on{color:var(--r);}
.mpb{background:none;border:none;cursor:pointer;font-size:26px;color:var(--w);padding:5px;}
.pg{width:100%;height:4px;background:rgba(255,255,255,.1);border-radius:2px;cursor:pointer;margin-bottom:4px;}
.pf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--dr),var(--r));position:relative;transition:width .5s linear;}
.pf::after{content:'';position:absolute;right:-5px;top:-4px;width:12px;height:12px;border-radius:50%;background:var(--r);}
.tl{display:flex;justify-content:space-between;font-size:10px;color:rgba(245,240,232,.28);margin-bottom:6px;}
.cts{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.cb{background:none;border:none;cursor:pointer;color:rgba(245,240,232,.5);font-size:20px;padding:8px;border-radius:50%;}
.cb.on{color:var(--r);}
.pb{width:52px;height:52px;border-radius:50%;background:var(--r);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;box-shadow:0 0 24px rgba(204,0,0,.5);}

.vr{display:flex;align-items:center;gap:8px;}
.vi{font-size:14px;color:rgba(245,240,232,.3);}
.vs{flex:1;-webkit-appearance:none;height:3px;background:rgba(255,255,255,.12);border-radius:2px;cursor:pointer;outline:none;}

.ntf{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(16,16,16,.97);border:1px solid rgba(204,0,0,.5);border-radius:10px;padding:10px 18px;font-size:12px;color:var(--w);z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s;max-width:85vw;text-align:center;}
.ntf.on{opacity:1;}
.full{position:fixed;inset:0;z-index:500;background:#040404;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px 24px;}

</style>

var tmr=null,errCnt=0,curList='s';
var ytp=null,ytRdy=false,queue=[];

window.onYouTubeIframeAPIReady=function(){
  ytp=new YT.Player('ytc',{
    width:'2',height:'2',
    playerVars:{autoplay:0,controls:0,playsinline:1,rel:0,enablejsapi:1,origin:location.origin},
    events:{
      onReady:function(){
        ytRdy=true;
        ytp.setVolume(vol);
        showSt('ok','&#10003; Gati! Kërko këngën tënde.');
        if(queue.length){var v=queue.shift();doPlay(v);}
      },
      onStateChange:function(e){
        var S=YT.PlayerState;
        if(e.data===S.PLAYING){
          playing=true;errCnt=0;updB();startTmr();
          document.getElementById('heq').classList.remove('off');
          msSetup();showSt('');
          // Ad skip: check every 500ms if ad is playing
          checkAd();
        }else if(e.data===S.PAUSED){
          playing=false;updB();stopTmr();
          document.getElementById('heq').classList.add('off');
        }else if(e.data===S.ENDED){
          nextSmart();
        }else if(e.data===-1){
          try{ytp.playVideo();}catch(x){}
        }
      },
      onError:function(){
        errCnt++;ntf('Video nuk luhet — kaloj...');
        if(errCnt<8)setTimeout(next,1000);else errCnt=0;
      }
    }
  });
};
(function(){var s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';document.head.appendChild(s);})();

function doPlay(videoId){
  if(!ytRdy||!ytp){queue=[videoId];return;}
  ytp.loadVideoById({videoId:videoId});
  var att=0,poll=setInterval(function(){
    att++;
    if(!ytp)return clearInterval(poll);
    var st=ytp.getPlayerState();
    if(st===1||st===3){clearInterval(poll);return;}
    if(att>20){clearInterval(poll);return;}
    try{ytp.playVideo();}catch(x){}
  },500);
}

function play(i,src){
  var list=src==='l'?JSON.parse(localStorage.getItem('sq_lk')||'[]')
          :src==='s'?tracks:(window[src]||tracks);
  tracks=list;curList=src;cur=i;
  var t=tracks[i];if(!t)return;
  updNP(t);
  document.querySelectorAll('.trk').forEach(function(el,j){el.classList.toggle('on',j===i);});
  svRc(t);ntf('&#9654; '+t.title.substring(0,50));
  doPlay(t.id);
}

function updNP(t){
  document.getElementById('nptl').textContent=t.title;
  document.getElementById('ftt').textContent=t.title;
  document.getElementById('npch').textContent=t.channel;
  document.getElementById('fch').textContent=t.channel;
  setThumb('npim','npni',t.thumb);
  setThumb('fimg','fno',t.thumb);
  updB();updHrt();
}
function setThumb(iId,fId,s){
  var img=document.getElementById(iId),fb=document.getElementById(fId);
  if(!s){img.style.opacity=0;fb.style.display='flex';return;}
  fb.style.display='none';img.style.opacity=1;
  img.onerror=function(){img.style.opacity=0;fb.style.display='flex';};
  img.src=s;
}
function updB(){
  var ic=playing?'&#9646;&#9646;':'&#9654;';
  ['pb','mpb','fpb'].forEach(function(id){document.getElementById(id).innerHTML=ic;});
}
function togPl(){
  if(cur===-1){ntf('Zgjidh një këngë');return;}
  if(!ytRdy||!ytp)return;
  if(playing)ytp.pauseVideo();else ytp.playVideo();
}
function prev(){if(!tracks.length)return;var i=sh?rnd():cur-1;if(i<0)i=tracks.length-1;play(i,curList);}
function next(){if(!tracks.length)return;var i=rp?cur:sh?rnd():cur+1;if(i>=tracks.length)i=0;play(i,curList);}
function rnd(){return Math.floor(Math.random()*tracks.length);}
function togSh(){sh=!sh;['shb','fsh'].forEach(function(id){document.getElementById(id).classList.toggle('on',sh);});ntf(sh?'Shuffle ON':'Shuffle OFF');}
function togRp(){rp=!rp;['rpb','frp'].forEach(function(id){document.getElementById(id).classList.toggle('on',rp);});ntf(rp?'Repeat ON':'Repeat OFF');}
function setVol(v){vol=parseInt(v);['mvs','fvs'].forEach(function(id){document.getElementById(id).value=v;});if(ytRdy&&ytp)ytp.setVolume(vol);}
function startTmr(){
  stopTmr();
  tmr=setInterval(function(){
    if(!ytRdy||!ytp)return;
    try{
      var p=ytp.getCurrentTime()||0,d=ytp.getDuration()||0,pc=d>0?(p/d)*100:0;
      ['mpf','fpf'].forEach(function(id){document.getElementById(id).style.width=pc+'%';});
      ['mct','fc'].forEach(function(id){document.getElementById(id).textContent=fmt(p);});
      ['mdt','fd'].forEach(function(id){document.getElementById(id).textContent=fmt(d);});
      try{if('mediaSession' in navigator&&navigator.mediaSession.setPositionState&&d>0)
        navigator.mediaSession.setPositionState({duration:d,playbackRate:1,position:p});}catch(x){}
    }catch(x){}
  },1000);
}
function stopTmr(){if(tmr){clearInterval(tmr);tmr=null;}}
function seek(e,bar){
  if(!ytRdy||!ytp)return;
  try{var d=ytp.getDuration()||0;if(!d)return;var r=bar.getBoundingClientRect();ytp.seekTo(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*d,true);}catch(x){}
}
async function ytFetch(ep,params){
  var url='https://www.googleapis.com/youtube/v3/'+ep+'?part=snippet&key='+KEY;
  Object.keys(params).forEach(function(k){url+='&'+k+'='+encodeURIComponent(params[k]);});
  var ctrl=new AbortController(),tid=setTimeout(function(){ctrl.abort();},10000);
  try{var r=await fetch(url,{signal:ctrl.signal});clearTimeout(tid);var d=await r.json();if(d.error)throw new Error(d.error.message);return d;}
  catch(e){clearTimeout(tid);throw e;}
}
async function getDurs(ids){
  try{var r=await fetch('https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id='+ids.join(',')+'&key='+KEY);var d=await r.json();var m={};(d.items||[]).forEach(function(v){m[v.id]=pDur(v.contentDetails.duration);});return m;}catch(x){return {};}
}
function i2t(items){
  return(items||[]).map(function(it){
    var id=it.id.videoId||it.id,sn=it.snippet||{},th=sn.thumbnails||{};
    var thumb=(th.high||th.medium||th.default||{}).url||('https://i.ytimg.com/vi/'+id+'/hqdefault.jpg');
    return{id:id,title:dH(sn.title||''),channel:sn.channelTitle||'',thumb:thumb,duration:'—'};
  });
}
async function doSearch(){
  var q=document.getElementById('si').value.trim();if(!q)return;
  document.getElementById('rl').innerHTML='<div class="dots"><i></i><i></i><i></i></div>';
  swTab('s');showSt('inf','&#9203; Duke kërkuar...');
  try{
    var d=await ytFetch('search',{q:q+' shqip',type:'video',maxResults:20});
    var list=i2t(d.items);
    var durs=await getDurs(list.map(function(t){return t.id;}));
    list.forEach(function(t){if(durs[t.id])t.duration=durs[t.id];});
    tracks=list;curList='s';
    renderList(tracks,document.getElementById('rl'),'s');
    showSt('ok','&#10003; '+tracks.length+' këngë — prek për të dëgjuar!');
    relatedTracks=[];lastQuery='';
    setTimeout(function(){fetchRelated(q);},1500);
  }catch(e){showSt('err','&#10060; '+e.message);document.getElementById('rl').innerHTML='<div class="emp"><div class="ic">&#9888;</div>'+esc(e.message)+'</div>';}
}
async function loadPreset(q,elId,lKey){
  var el=document.getElementById(elId);el.innerHTML='<div class="dots"><i></i><i></i><i></i></div>';
  try{
    var d=await ytFetch('search',{q:q,type:'video',maxResults:25});
    var list=i2t(d.items);var durs=await getDurs(list.map(function(t){return t.id;}));
    list.forEach(function(t){if(durs[t.id])t.duration=durs[t.id];});
    window[lKey]=list;renderList(list,el,lKey);
  }catch(e){el.innerHTML='<div class="emp"><div class="ic">&#9888;</div>'+esc(e.message)+'</div>';}
}

      +'<div class="tth"><img src="'+t.thumb+'" alt="" loading="lazy" onerror="this.style.opacity=0;this.nextSibling.style.display=\'flex\'">'
      +'<div class="tno" style="display:none"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M9 18V5l12-2v13" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/><circle cx="6" cy="18" r="3" stroke="#D4AF37" stroke-width="1.5"/><circle cx="18" cy="16" r="3" stroke="#D4AF37" stroke-width="1.5"/></svg></div>'
      +'<div class="pov">&#9654;</div></div>'
      +'<div class="ti"><div class="tn">'+esc(t.title)+'</div><div class="tc2">'+esc(t.channel)+'</div></div>'
      +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">'

function togLk(){
  if(cur===-1)return;var t=tracks[cur];
  var lk=JSON.parse(localStorage.getItem('sq_lk')||'[]');
  var ex=lk.findIndex(function(x){return x.id===t.id;});
  if(ex!==-1){lk.splice(ex,1);ntf('Hequr');}else{lk.unshift(t);ntf('&#9829; Shtuar!');}
  localStorage.setItem('sq_lk',JSON.stringify(lk));updHrt();
}
function updHrt(){
  if(cur===-1)return;
  var lk=JSON.parse(localStorage.getItem('sq_lk')||'[]');
  var ok=lk.some(function(x){return x.id===(tracks[cur]||{}).id;});
  document.getElementById('hbtn').classList.toggle('on',ok);
  document.getElementById('hbtn').innerHTML=ok?'&#9829;':'&#9825;';
}
function renderLk(){
  var lk=JSON.parse(localStorage.getItem('sq_lk')||'[]');
  var el=document.getElementById('ll');
  if(!lk.length){el.innerHTML='<div class="emp">Nuk ke ende këngë &#9825;</div>';return;}
  renderList(lk,el,'l');
}
function renderRc(){
  var rc=JSON.parse(localStorage.getItem('sq_rc')||'[]');
  var el=document.getElementById('rcl');
  if(!el)return;
  if(!rc.length){el.innerHTML='<div class="emp">Historiku është bosh</div>';return;}
  var saved=tracks,savedList=curList;
  tracks=rc;curList='rc';
  renderList(rc,el,'rc');
  tracks=saved;curList=savedList;
}
function svRc(t){
  var rc=JSON.parse(localStorage.getItem('sq_rc')||'[]');
  rc=rc.filter(function(x){return x.id!==t.id;});rc.unshift(t);
  if(rc.length>50)rc.pop();localStorage.setItem('sq_rc',JSON.stringify(rc));
}
function swTab(n){
  ['s','h','n','l','rc','pl'].forEach(function(x,i){
    var el=document.getElementById('t'+x);
    if(el)el.classList.toggle('on',x===n);
    var tabs=document.querySelectorAll('.tab');
    if(tabs[i])tabs[i].classList.toggle('on',x===n);
  });
  if(n==='h'&&!window.hList)loadPreset('muzik shqip top hite 2024 2025','hl','hList');
  if(n==='n'&&!window.nList)loadPreset('kenget e reja shqip 2025 2026','nl','nList');
  if(n==='l')renderLk();
  if(n==='rc')renderRc();
  if(n==='pl')renderPLs();
}

function msSetup(){
  if(!('mediaSession' in navigator))return;
  var t=tracks[cur];if(!t)return;
  // Use absolute URL for Android Auto compatibility
  var thumb=t.thumb||'';
  if(thumb&&!thumb.startsWith('http'))thumb='https://i.ytimg.com/vi/'+t.id+'/hqdefault.jpg';
  var thumbHQ='https://i.ytimg.com/vi/'+t.id+'/maxresdefault.jpg';
  navigator.mediaSession.metadata=new MediaMetadata({
    title:t.title,
    artist:t.channel,
    album:'Shqipëria Music',
    artwork:[
      {src:thumbHQ,sizes:'1280x720',type:'image/jpeg'},
      {src:thumb,sizes:'480x360',type:'image/jpeg'},
      {src:'https://i.ytimg.com/vi/'+t.id+'/mqdefault.jpg',sizes:'320x180',type:'image/jpeg'}
    ]
  });
  navigator.mediaSession.setActionHandler('play',function(){if(ytp)ytp.playVideo();});
  navigator.mediaSession.setActionHandler('pause',function(){if(ytp)ytp.pauseVideo();});
  navigator.mediaSession.setActionHandler('nexttrack',next);
  navigator.mediaSession.setActionHandler('previoustrack',prev);
  try{navigator.mediaSession.setActionHandler('seekto',function(d){if(ytp)ytp.seekTo(d.seekTime,true);});}catch(x){}
  navigator.mediaSession.playbackState='playing';
}

// === AD SKIP ===
var adCheckTimer=null;
function checkAd(){
  clearInterval(adCheckTimer);
  adCheckTimer=setInterval(function(){
    if(!ytp||!ytRdy)return;
    try{
      var iframe=document.querySelector('#ytc iframe');
      if(!iframe)return;
      // Check if current video duration is very short (ad indicator)
      var dur=ytp.getDuration()||0;
      var curr=ytp.getCurrentTime()||0;
      // Try to find skip button via postMessage
      ytp.getIframe&&ytp.getIframe().contentWindow&&
        ytp.getIframe().contentWindow.postMessage(
          '{"event":"command","func":"seekTo","args":['+(dur>0?dur:99999)+',true]}','*'
        );
    }catch(x){}
  },500);
  // Stop checking after 40 seconds (ads are max 30s)
  setTimeout(function(){clearInterval(adCheckTimer);},40000);
}

// === SMART AUTOPLAY (like YouTube) ===
var relatedTracks=[];
var lastQuery='';

async function nextSmart(){
  // If we have a queue of related tracks, play next
  if(relatedTracks.length>0){
    var nxt=relatedTracks.shift();
    tracks.unshift(nxt);
    cur=0;
    updNP(nxt);
    doPlay(nxt.id);
    ntf('&#9654; '+nxt.title.substring(0,50));
    // Fetch more if running low
    if(relatedTracks.length<3) fetchRelated(nxt.title);
    return;
  }
  // Otherwise use normal next
  if(!tracks.length)return;
  var i=rp?cur:sh?rnd():cur+1;
  if(i>=tracks.length)i=0;
  play(i,curList);
}

async function fetchRelated(title){
  if(!title)return;
  try{
    // Extract artist name from title (before dash or first 2 words)
    var artist=title.split('-')[0].trim().split(' ').slice(0,2).join(' ');
    var queries=[
      artist+' shqip mix',
      artist+' kenget me te mira',
      'remix shqip '+new Date().getFullYear()
    ];
    var q=queries[Math.floor(Math.random()*queries.length)];
    if(q===lastQuery)return;
    lastQuery=q;
    var d=await ytFetch('search',{q:q,type:'video',maxResults:10});
    var list=i2t(d.items);
    // Filter out already played
    var played=JSON.parse(localStorage.getItem('sq_rc')||'[]').map(function(x){return x.id;});
    list=list.filter(function(t){return played.indexOf(t.id)===-1;});
    relatedTracks=relatedTracks.concat(list).slice(0,15);
  }catch(x){}
}

function createPL(){

  if(!name){ntf('Shkruaj emrin e playlist-it');return;}
  var pls=JSON.parse(localStorage.getItem('sq_pls')||'{}');

  localStorage.setItem('sq_pls',JSON.stringify(pls));
  document.getElementById('plName').value='';
  ntf('&#9783; Playlist "'+name+'" u krijua!');
  renderPLs();
}

function openPL(encodedName){
  var name=decodeURIComponent(encodedName);
  var pls=JSON.parse(localStorage.getItem('sq_pls')||'{}');
  var list=pls[name]||[];
  var el=document.getElementById('pll');
  if(!list.length){
    ntf('Playlist "'+name+'" është bosh — shto këngë me ♥');
    return;
  }
  tracks=list;curList='pl_'+name;
  renderList(list,el,'pl_'+name);
  ntf('&#9783; Duke luajtur: '+name);
  if(list.length>0)play(0,'pl_'+name);
}

function deletePL(encodedName){
  var name=decodeURIComponent(encodedName);
  var pls=JSON.parse(localStorage.getItem('sq_pls')||'{}');
  delete pls[name];
  localStorage.setItem('sq_pls',JSON.stringify(pls));
  ntf('U fshi playlist "'+name+'"');
  renderPLs();
}

function addToPL(track){
  var pls=JSON.parse(localStorage.getItem('sq_pls')||'{}');
  var names=Object.keys(pls);
  if(!names.length){ntf('Krijo një playlist fillimisht');swTab('pl');return;}
  // If only one playlist, add directly
  if(names.length===1){
    pls[names[0]].push(track);
    localStorage.setItem('sq_pls',JSON.stringify(pls));
    ntf('&#9783; Shtuar te "'+names[0]+'"');
    return;
  }
  // Show picker
  var picker=document.createElement('div');
  picker.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;';
  picker.innerHTML='<div style="background:#181818;border-radius:12px;width:100%;max-width:320px;overflow:hidden;">'
    +'<div style="padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);font-family:Cinzel,serif;font-size:12px;letter-spacing:2px;color:#CC0000;">SHTO TE PLAYLIST</div>'
    +names.map(function(n){

    }).join('')
    +'<div style="padding:14px 16px;cursor:pointer;color:rgba(245,240,232,.4);font-size:13px;" onclick="document.body.removeChild(this.closest('[style*=fixed]'))">Anulo</div>'
    +'</div>';

function addToSpecificPL(encodedName,encodedTrack){
  var name=decodeURIComponent(encodedName);
  var track=JSON.parse(decodeURIComponent(encodedTrack));
  var pls=JSON.parse(localStorage.getItem('sq_pls')||'{}');
  if(!pls[name])pls[name]=[];
  if(pls[name].find(function(x){return x.id===track.id;})){ntf('Tashmë është në playlist');return;}
  pls[name].push(track);
  localStorage.setItem('sq_pls',JSON.stringify(pls));
  ntf('&#9783; Shtuar te "'+name+'"');
}

// === EQUALIZER ===
var eqCtx=null,eqFilters=[],eqSource=null,eqConnected=false;
var eqFreqs=[60,250,1000,4000,16000];
var eqIds=['eq60','eq250','eq1k','eq4k','eq16k'];

function initEQ(){
  try{
    if(eqCtx)return;
    eqCtx=new(window.AudioContext||window.webkitAudioContext)();
    eqFilters=eqFreqs.map(function(freq,i){
      var f=eqCtx.createBiquadFilter();
      f.type=i===0?'lowshelf':i===eqFreqs.length-1?'highshelf':'peaking';
      f.frequency.value=freq;
      f.gain.value=0;
      return f;
    });
    // Chain filters
    for(var i=0;i<eqFilters.length-1;i++){
      eqFilters[i].connect(eqFilters[i+1]);
    }
    eqFilters[eqFilters.length-1].connect(eqCtx.destination);
  }catch(x){}
}

function toggleEQ(){
  var p=document.getElementById('eqPanel');
  if(p)p.style.display=p.style.display==='none'?'block':'none';
  initEQ();
}

function updateEQ(){
  if(!eqCtx)initEQ();
  eqIds.forEach(function(id,i){
    var v=parseFloat(document.getElementById(id).value)||0;
    if(eqFilters[i])eqFilters[i].gain.value=v;
  });
  // Save EQ settings
  var vals=eqIds.map(function(id){return document.getElementById(id).value;});
  localStorage.setItem('sq_eq',JSON.stringify(vals));
}

function eqPreset(b1,b2,m,t1,t2){
  var vals=[b1,b2,m,t1,t2];
  eqIds.forEach(function(id,i){document.getElementById(id).value=vals[i];});
  updateEQ();
  ntf('EQ u ndryshua!');
}

// Load saved EQ on start
(function(){
  var saved=JSON.parse(localStorage.getItem('sq_eq')||'null');
  if(saved){setTimeout(function(){eqIds.forEach(function(id,i){var el=document.getElementById(id);if(el)el.value=saved[i]||0;});if(eqCtx)updateEQ();},1000);}
})();

// CROSSFADE (2 second fade between songs)
// ════════════════════════════════════════════════
var cfDuration=2000;
function crossfadeTo(videoId){
  if(!ytRdy||!ytp)return;
  var ov=document.getElementById('cfOverlay');
  // Fade out current
  if(ov){ov.style.background='rgba(0,0,0,0.7)';ov.style.transition='background '+cfDuration/2000+'s ease';}
  // Lower volume gradually
  var startVol=vol;
  var steps=20;
  var step=0;
  var fadeOut=setInterval(function(){
    step++;
    if(!ytRdy||!ytp){clearInterval(fadeOut);return;}
    try{ytp.setVolume(Math.max(0,startVol-(startVol/steps)*step));}catch(x){}
    if(step>=steps){
      clearInterval(fadeOut);
      // Load new video
      try{
        ytp.loadVideoById({videoId:videoId});
        var att=0,poll=setInterval(function(){
          att++;
          if(!ytp)return clearInterval(poll);
          var st=ytp.getPlayerState();
          if(st===1||st===3){clearInterval(poll);return;}
          if(att>20){clearInterval(poll);return;}
          try{ytp.playVideo();}catch(x){}
        },400);
      }catch(x){}
      // Fade volume back in
      var step2=0;
      var fadeIn=setInterval(function(){
        step2++;
        if(!ytRdy||!ytp){clearInterval(fadeIn);return;}
        try{ytp.setVolume(Math.min(startVol,(startVol/steps)*step2));}catch(x){}
        if(step2>=steps){
          clearInterval(fadeIn);
          try{ytp.setVolume(startVol);}catch(x){}
        }
      },cfDuration/2/steps);
      // Fade overlay back out
      if(ov){setTimeout(function(){ov.style.background='rgba(0,0,0,0)';},200);}
    }
  },cfDuration/2/steps);
}

// Use Audio element as a "bridge" - keeps audio session alive on lock screen
var bridgeAudio=null;
function initBridgeAudio(){
  if(bridgeAudio)return;
  try{
    // Create a silent but real audio element
    // This keeps the audio session active even when screen is locked
    bridgeAudio=new Audio();
    bridgeAudio.src='data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAA'+
      'EAAQAAgD4AAAB9AAACABAAZGFOYQoGAACBhYqFbF1fdJivrJBhUF'+
      'KLo7mnjFZBNSuMoMSzm3JKOC+Vq9fSr4NTOyqVrN3ZuI9fRDCiq'+
      'NjWuJFlSDAtl7bj1a6EWz4sl8Df0LOBWUMynrrj2b2XaVBCMamw4'+
      'NmwjGhQPyqksd/TrYZiVE8unMTl3MObaVJKP';
    bridgeAudio.loop=true;
    bridgeAudio.volume=0.001; // Nearly silent
    bridgeAudio.play().catch(function(){});
  }catch(x){}
}

// Override doPlay to use crossfade
var originalDoPlay=doPlay;
function doPlay(videoId){
  if(playing&&ytRdy&&ytp){
    // Use crossfade if already playing
    try{
      var st=ytp.getPlayerState();
      if(st===1){crossfadeTo(videoId);return;}
    }catch(x){}
  }
  originalDoPlay(videoId);
}

// ── LOCK SCREEN AUTOPLAY FIX ──────────────────────────
// When screen locks, browser suspends JS timers
// We use multiple strategies to ensure next song plays

// Strategy 1: MediaSession nexttrack handler (lock screen controls)
// Strategy 2: Audio element onended event
// Strategy 3: Page visibility restore

var nextSongQueued=false;
var nextSongId=null;

// Enhanced visibility handler
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'){
    reqWL();
    // If a next song was queued while screen was off, play it now
    if(nextSongQueued&&nextSongId){
      nextSongQueued=false;
      var id=nextSongId;nextSongId=null;
      if(ytRdy&&ytp){
        try{
          ytp.loadVideoById({videoId:id});
          setTimeout(function(){try{ytp.playVideo();}catch(x){}},500);
        }catch(x){}
      }
    } else if(playing&&ytRdy&&ytp){
      try{
        var st=ytp.getPlayerState();
        if(st===2||st===-1||st===0)ytp.playVideo();
      }catch(x){}
    }
  }
});

// Enhanced next() for lock screen
function next(){
  if(!tracks.length)return;
  var i=rp?cur:sh?rnd():cur+1;
  if(i>=tracks.length)i=0;
  var t=tracks[i];
  if(!t)return;

  cur=i;
  updNP(t);
  svRc(t);
  document.querySelectorAll('.trk').forEach(function(el,j){el.classList.toggle('on',j===i);});

  if(document.hidden){
    // Screen is off - queue the song and try to play
    nextSongQueued=true;
    nextSongId=t.id;
    // Still try to play directly
    if(ytRdy&&ytp){
      try{
        ytp.loadVideoById({videoId:t.id});
        setTimeout(function(){try{ytp.playVideo();}catch(x){}},800);
        setTimeout(function(){try{ytp.playVideo();}catch(x){}},2000);
        setTimeout(function(){try{ytp.playVideo();}catch(x){}},4000);
      }catch(x){}
    }
  } else {
    doPlay(t.id);
  }
  nextSmart_related(t);
}

function nextSmart_related(t){
  if(relatedTracks&&relatedTracks.length>0){
    var nxt=relatedTracks.shift();
    tracks[cur]=t; // keep current
  }
  if(relatedTracks&&relatedTracks.length<3)fetchRelated(t.title);
}

// ── NOTIFICATIONS ─────────────────────────────────────
function showNotification(title,artist,thumb){
  if(!('Notification' in window))return;
  if(Notification.permission==='granted'){
    try{
      new Notification('▶ '+title,{
        body:artist,
        icon:thumb||'',
        silent:true,
        tag:'shqiperia-now-playing'
      });
    }catch(x){}
  } else if(Notification.permission!=='denied'){
    Notification.requestPermission();
  }
}

// Enhanced msSetup with notification
var originalMsSetup=msSetup;
function msSetup(){
  originalMsSetup();
  var t=tracks[cur];if(!t)return;
  // Show notification
  showNotification(t.title,t.channel,t.thumb);
  // Init bridge audio for lock screen
  initBridgeAudio();
}

// Request notification permission on first play
document.addEventListener('click',function(){
  if('Notification' in window&&Notification.permission==='default'){
    Notification.requestPermission();
  }
  initBridgeAudio();
},{once:true});

function pDur(iso){var m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);if(!m)return'—';var h=+(m[1]||0),mn=+(m[2]||0),s=+(m[3]||0);return h>0?h+':'+String(mn).padStart(2,'0')+':'+String(s).padStart(2,'0'):mn+':'+String(s).padStart(2,'0');}

// === BACKGROUND KEEP-ALIVE ===
// 1. Wake Lock - keeps screen/CPU awake
var wl=null;
async function reqWL(){
  try{
    if('wakeLock' in navigator){
      wl=await navigator.wakeLock.request('screen');
      wl.addEventListener('release',function(){setTimeout(reqWL,1000);});
    }
  }catch(x){}
}

// 2. Silent audio loop - tricks browser into keeping audio context alive
// This is the standard trick used by Spotify/YouTube PWAs
var silentAud=null;
function startSilentAudio(){
  try{
    if(silentAud)return;
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var buf=ctx.createBuffer(1,ctx.sampleRate,ctx.sampleRate);
    var src=ctx.createBufferSource();
    src.buffer=buf;
    src.loop=true;
    src.connect(ctx.destination);
    src.start();
    silentAud=src;
  }catch(x){}
}

// 3. Re-acquire wake lock and resume audio on visibility change
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'){
    reqWL();
    if(playing&&ytRdy&&ytp){try{ytp.playVideo();}catch(x){}}
  }
});

// 4. Keep alive ping - prevents browser from suspending
setInterval(function(){
  if(playing&&ytRdy&&ytp){
    try{
      var st=ytp.getPlayerState();
      if(st===2||st===-1){ytp.playVideo();}
    }catch(x){}
  }
},5000);

// 5. Page visibility + screen off detection
window.addEventListener('blur',function(){
  if(playing) setTimeout(function(){
    if(playing&&ytRdy&&ytp){try{ytp.playVideo();}catch(x){}}
  },2000);
});

reqWL();
// Start silent audio on first user interaction
document.addEventListener('click',function(){startSilentAudio();},{once:true});
document.addEventListener('touchstart',function(){startSilentAudio();},{once:true});
